version: '3.8'

services:
  svda:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - IBM_API_KEY=${IBM_API_KEY}
      - IBM_PROJECT_ID=${IBM_PROJECT_ID}
      - IBM_URL=${IBM_URL:-https://us-south.ml.cloud.ibm.com}
    volumes:
      - ./data:/app/data
      - ./vector_store:/app/vector_store
      - ./static/generated:/app/static/generated
    restart: unless-stopped
