[build]
  publish = "frontend/"

# Serve static files, redirect non-file paths to index.html
[[redirects]]
  from = "/agent"
  to = "/agent.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200
