[build]
  # Install dependencies
  command = "pip install -r requirements.txt"
  # Publish directory (for static files)
  publish = "frontend/"

# Redirects for SPA (Single Page Application)Single Page Application - serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# API routes - these would go to serverless functions
# We'll need to create netlify functions for our API endpoints