name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # Every 10 minutes
  workflow_dispatch:  # Manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render backend
        run: |
          curl -s --max-time 30 https://street-vendor-digitalization-agent-isog.onrender.com/api/ping || echo "Ping failed (Render may be waking up)"
