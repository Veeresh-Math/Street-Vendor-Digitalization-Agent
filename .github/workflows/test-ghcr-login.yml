name: Test GHCR Login
on:
  workflow_dispatch:
jobs:
  test-login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Veeresh-Math
          password: ${{ secrets.GHCR_PAT }}
