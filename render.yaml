services:
  - type: web
    name: street-vendor-agent
    env: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    envVars:
      - key: IBM_API_KEY
        sync: false
      - key: IBM_PROJECT_ID
        sync: false
      - key: IBM_URL
        value: "https://au-syd.ml.cloud.ibm.com"
      - key: IBM_VECTOR_STORE_ID
        value: "019f64e9-1223-7565-9cb3-cfeb55dc79e4"
      - key: RAG_QUERY_CACHE_ENABLED
        value: "true"
      - key: DEMO_MODE
        value: "true"
      - key: DAILY_EMBED_LIMIT
        value: "500"
      - key: DAILY_GEN_LIMIT
        value: "1000"
    autoDeploy: true
